
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Weather</title>
    <!-- Apply saved theme before render to prevent flash -->
    <script>
        (function() {
            var t = localStorage.getItem('weather-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <link rel="stylesheet" href="/static/lib/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ── THEME VARIABLES ── */
        html[data-theme="dark"] {
            --bg:                   #0d1117;
            --header-bg:            rgba(13,17,23,0.95);
            --header-border:        rgba(255,255,255,0.07);
            --logo-color:           #fff;
            --logo-icon:            #60a5fa;
            --tab-color:            rgba(255,255,255,0.4);
            --tab-hover-color:      rgba(255,255,255,0.8);
            --tab-hover-bg:         rgba(255,255,255,0.05);
            --tab-active-color:     #fff;
            --tab-active-border:    rgba(255,255,255,0.12);
            --tab-active-bg:        rgba(255,255,255,0.08);
            --input-bg:             rgba(255,255,255,0.06);
            --input-border:         rgba(255,255,255,0.1);
            --input-color:          #fff;
            --input-placeholder:    rgba(255,255,255,0.3);
            --panel-bg:             rgba(13,17,23,0.88);
            --panel-border:         rgba(255,255,255,0.1);
            --panel-title:          rgba(255,255,255,0.5);
            --panel-text:           rgba(255,255,255,0.7);
            --sidebar-bg:           linear-gradient(180deg,#0d1117 0%,#111827 100%);
            --sidebar-border:       rgba(255,255,255,0.07);
            --placeholder-color:    rgba(255,255,255,0.2);
            --placeholder-icon:     rgba(52,211,153,0.3);
            --loading-color:        rgba(255,255,255,0.4);
            --city-color:           #fff;
            --coords-color:         rgba(255,255,255,0.3);
            --temp-color:           #fff;
            --desc-color:           rgba(255,255,255,0.5);
            --card-top-bg:          linear-gradient(135deg,rgba(52,211,153,0.1),rgba(59,130,246,0.08));
            --card-top-border:      rgba(255,255,255,0.08);
            --detail-bg:            rgba(255,255,255,0.04);
            --detail-border:        rgba(255,255,255,0.07);
            --detail-label:         rgba(255,255,255,0.3);
            --detail-value:         #fff;
            --forecast-day:         rgba(255,255,255,0.7);
            --forecast-desc:        rgba(255,255,255,0.4);
            --forecast-hi:          #fff;
            --forecast-lo:          rgba(255,255,255,0.35);
            --forecast-title:       rgba(255,255,255,0.35);
            --overlay-label-bg:     rgba(13,17,23,0.85);
            --overlay-label-border: rgba(255,255,255,0.1);
            --overlay-label-color:  rgba(255,255,255,0.6);
            --toggle-bg:            rgba(255,255,255,0.08);
            --toggle-border:        rgba(255,255,255,0.12);
            --toggle-color:         rgba(255,255,255,0.6);
            --map-style:            dark_all;
        }

        html[data-theme="light"] {
            --bg:                   #f0f4f8;
            --header-bg:            rgba(255,255,255,0.95);
            --header-border:        rgba(0,0,0,0.08);
            --logo-color:           #1e293b;
            --logo-icon:            #3b82f6;
            --tab-color:            rgba(30,41,59,0.45);
            --tab-hover-color:      rgba(30,41,59,0.85);
            --tab-hover-bg:         rgba(0,0,0,0.05);
            --tab-active-color:     #1e293b;
            --tab-active-border:    rgba(0,0,0,0.1);
            --tab-active-bg:        rgba(0,0,0,0.06);
            --input-bg:             #f8fafc;
            --input-border:         rgba(0,0,0,0.12);
            --input-color:          #1e293b;
            --input-placeholder:    rgba(30,41,59,0.35);
            --panel-bg:             rgba(255,255,255,0.92);
            --panel-border:         rgba(0,0,0,0.08);
            --panel-title:          rgba(30,41,59,0.5);
            --panel-text:           rgba(30,41,59,0.75);
            --sidebar-bg:           linear-gradient(180deg,#f8fafc 0%,#f1f5f9 100%);
            --sidebar-border:       rgba(0,0,0,0.07);
            --placeholder-color:    rgba(30,41,59,0.3);
            --placeholder-icon:     rgba(16,185,129,0.4);
            --loading-color:        rgba(30,41,59,0.45);
            --city-color:           #1e293b;
            --coords-color:         rgba(30,41,59,0.35);
            --temp-color:           #1e293b;
            --desc-color:           rgba(30,41,59,0.5);
            --card-top-bg:          linear-gradient(135deg,rgba(16,185,129,0.08),rgba(59,130,246,0.06));
            --card-top-border:      rgba(0,0,0,0.07);
            --detail-bg:            #ffffff;
            --detail-border:        rgba(0,0,0,0.07);
            --detail-label:         rgba(30,41,59,0.4);
            --detail-value:         #1e293b;
            --forecast-day:         rgba(30,41,59,0.8);
            --forecast-desc:        rgba(30,41,59,0.5);
            --forecast-hi:          #1e293b;
            --forecast-lo:          rgba(30,41,59,0.4);
            --forecast-title:       rgba(30,41,59,0.4);
            --overlay-label-bg:     rgba(255,255,255,0.90);
            --overlay-label-border: rgba(0,0,0,0.08);
            --overlay-label-color:  rgba(30,41,59,0.65);
            --toggle-bg:            #e2e8f0;
            --toggle-border:        rgba(0,0,0,0.1);
            --toggle-color:         #64748b;
            --map-style:            light_all;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s;
        }

        /* ── HEADER ── */
        header {
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--header-border);
            flex-shrink: 0;
            backdrop-filter: blur(12px);
            height: 56px;
            position: relative;
            z-index: 1000;
            transition: background 0.3s, border-color 0.3s;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 9px;
            color: var(--logo-color);
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: -0.3px;
            transition: color 0.3s;
        }

        .logo i { color: var(--logo-icon); font-size: 1.1rem; transition: color 0.3s; }

        /* ── THEME TOGGLE BUTTON ── */
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--toggle-border);
            background: var(--toggle-bg);
            color: var(--toggle-color);
            font-size: 0.9rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .theme-toggle:hover { opacity: 0.75; }

        /* ── TABS ── */
        .tabs {
            display: flex;
            gap: 4px;
            flex: 1;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 16px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--tab-color);
            font-size: 0.82rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab:hover {
            color: var(--tab-hover-color);
            background: var(--tab-hover-bg);
        }

        .tab.active {
            color: var(--tab-active-color);
            border-color: var(--tab-active-border);
            background: var(--tab-active-bg);
        }

        .tab i { font-size: 0.85rem; }

        .tab-rain.active   { color: #38bdf8; border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.08); }
        .tab-wind.active   { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.08); }
        .tab-temp.active   { color: #fb923c; border-color: rgba(251,146,60,0.3);  background: rgba(251,146,60,0.08); }
        .tab-clouds.active { color: #94a3b8; border-color: rgba(148,163,184,0.3); background: rgba(148,163,184,0.08); }
        .tab-weather.active{ color: #34d399; border-color: rgba(52,211,153,0.3);  background: rgba(52,211,153,0.08); }

        /* ── SEARCH (weather tab only) ── */
        .search-wrap {
            display: none;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .search-wrap.visible { display: flex; }

        .search-wrap input {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--input-color);
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 220px;
            transition: border 0.2s, background 0.3s, color 0.3s;
        }

        .search-wrap input:focus { border-color: rgba(52,211,153,0.4); }
        .search-wrap input::placeholder { color: var(--input-placeholder); }

        .search-wrap button {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #059669, #047857);
            color: #fff;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .search-wrap button:hover { opacity: 0.85; }

        /* ── LAYOUT ── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        #map {
            flex: 1;
            height: 100%;
            cursor: default;
        }

        #map.clickable { cursor: crosshair; }

        /* ── LEGEND (for overlay tabs) ── */
        .legend {
            display: none;
            position: absolute;
            bottom: 28px;
            left: 16px;
            z-index: 999;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 14px 16px;
            min-width: 160px;
            backdrop-filter: blur(10px);
            transition: background 0.3s, border-color 0.3s;
        }

        .legend.visible { display: block; }

        .legend-title {
            color: var(--panel-title);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 0.78rem;
            color: var(--panel-text);
        }

        .legend-color {
            width: 28px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        /* ── SIDEBAR (weather tab only) ── */
        .sidebar {
            display: none;
            width: 310px;
            flex-shrink: 0;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--sidebar-border);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            overflow-y: auto;
            transition: background 0.3s, border-color 0.3s;
        }

        .sidebar.visible { display: flex; }

        .placeholder {
            text-align: center;
            color: var(--placeholder-color);
        }

        .placeholder .big-icon {
            font-size: 2.8rem;
            color: var(--placeholder-icon);
            margin-bottom: 14px;
        }

        .placeholder p { font-size: 0.82rem; line-height: 1.7; }

        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--loading-color);
            font-size: 0.85rem;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(52,211,153,0.2);
            border-top-color: #34d399;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fca5a5;
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
            line-height: 1.5;
        }

        .error-msg i { display: block; font-size: 1.4rem; margin-bottom: 8px; color: #ef4444; }

        /* ── WEATHER CARD ── */
        .weather-card {
            display: none;
            width: 100%;
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-top {
            background: var(--card-top-bg);
            border: 1px solid var(--card-top-border);
            border-radius: 16px;
            padding: 22px 18px;
            text-align: center;
            margin-bottom: 10px;
            transition: background 0.3s, border-color 0.3s;
        }

        .city-name {
            color: var(--city-color);
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            transition: color 0.3s;
        }

        .coords {
            color: var(--coords-color);
            font-size: 0.72rem;
            margin-top: 3px;
            margin-bottom: 12px;
            transition: color 0.3s;
        }

        .weather-icon {
            width: 86px;
            height: 86px;
            filter: drop-shadow(0 0 18px rgba(52,211,153,0.35));
        }

        .temp-main {
            font-size: 3.8rem;
            font-weight: 700;
            color: var(--temp-color);
            line-height: 1;
            letter-spacing: -2px;
            transition: color 0.3s;
        }

        .temp-main sup {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0;
            vertical-align: super;
        }

        .description {
            color: var(--desc-color);
            font-size: 0.88rem;
            margin-top: 5px;
            text-transform: capitalize;
            transition: color 0.3s;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .detail-box {
            background: var(--detail-bg);
            border: 1px solid var(--detail-border);
            border-radius: 12px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s, border-color 0.3s;
        }

        .detail-box i { font-size: 1.1rem; width: 22px; text-align: center; }
        .detail-box .label { color: var(--detail-label); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; transition: color 0.3s; }
        .detail-box .value { color: var(--detail-value); font-size: 0.95rem; font-weight: 600; transition: color 0.3s; }

        .icon-feels  { color: #f97316; }
        .icon-humid  { color: #38bdf8; }
        .icon-wind   { color: #a78bfa; }
        .icon-vis    { color: #34d399; }
        .forecast-section {
            width: 100%;
            margin-top: 10px;
            display: none;
        }

        .forecast-section.visible { display: block; }

        .forecast-title {
            color: var(--forecast-title);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .forecast-row {
            display: flex;
            align-items: center;
            background: var(--detail-bg);
            border: 1px solid var(--detail-border);
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 6px;
            gap: 10px;
            animation: fadeIn 0.3s ease;
            transition: background 0.3s, border-color 0.3s;
        }

        .forecast-day {
            color: var(--forecast-day);
            font-size: 0.78rem;
            font-weight: 500;
            width: 80px;
            flex-shrink: 0;
        }

        .forecast-icon {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }

        .forecast-desc {
            color: var(--forecast-desc);
            font-size: 0.72rem;
            flex: 1;
            text-transform: capitalize;
        }

        .forecast-temps {
            text-align: right;
            flex-shrink: 0;
        }

        .forecast-temps .hi { color: var(--forecast-hi); font-size: 0.88rem; font-weight: 600; }
        .forecast-temps .lo { color: var(--forecast-lo); font-size: 0.75rem; }

        /* ── OVERLAY LABEL ── */
        .overlay-label {
            display: none;
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: var(--overlay-label-bg);
            border: 1px solid var(--overlay-label-border);
            border-radius: 20px;
            padding: 6px 16px;
            color: var(--overlay-label-color);
            font-size: 0.78rem;
            backdrop-filter: blur(8px);
            pointer-events: none;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        .overlay-label.visible { display: block; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <i class="fa-solid fa-cloud-sun"></i>
        India Weather
    </div>

    <div class="tabs">
        <button class="tab tab-rain" onclick="switchTab('rain')">
            <i class="fa-solid fa-cloud-rain"></i> Rain
        </button>
        <button class="tab tab-wind" onclick="switchTab('wind')">
            <i class="fa-solid fa-wind"></i> Wind
        </button>
        <button class="tab tab-temp" onclick="switchTab('temp')">
            <i class="fa-solid fa-temperature-half"></i> Temperature
        </button>
        <button class="tab tab-clouds" onclick="switchTab('clouds')">
            <i class="fa-solid fa-cloud"></i> Clouds
        </button>
        <button class="tab tab-weather active" onclick="switchTab('weather')">
            <i class="fa-solid fa-sun"></i> Weather
        </button>
    </div>

    <div class="search-wrap visible" id="search-wrap">
        <form method="POST" style="display:flex;gap:8px;">
            <input type="text" name="city" placeholder="Search city in India..."
                   value="{{ request.form.get('city', '') }}">
            <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
        </form>
    </div>

    <!-- Light / Dark toggle -->
    <button class="theme-toggle" id="theme-toggle" title="Toggle light / dark mode">
        <i class="fa-solid fa-sun" id="theme-icon"></i>
    </button>
</header>

<div class="main">
    <div id="map"></div>

    <div class="overlay-label" id="overlay-label"></div>

    <!-- Legend for overlay tabs -->
    <div class="legend" id="legend"></div>

    <!-- Sidebar only for Weather tab -->
    <div class="sidebar visible" id="sidebar">

        <div class="placeholder" id="placeholder">
            <div class="big-icon"><i class="fa-solid fa-map-location-dot"></i></div>
            <p>Search a city above<br>or click anywhere on the map<br>to see live weather</p>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            Fetching weather...
        </div>

        <div class="error-msg" id="error-msg">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="error-text"></span>
        </div>

        <div class="weather-card" id="weather-card">
            <div class="card-top">
                <div class="city-name" id="w-city"></div>
                <div class="coords" id="w-coords"></div>
                <img class="weather-icon" id="w-icon" src="" alt="">
                <div class="temp-main" id="w-temp"></div>
                <div class="description" id="w-desc"></div>
            </div>
            <div class="details-grid">
                <div class="detail-box">
                    <i class="fa-solid fa-temperature-half icon-feels"></i>
                    <div><div class="label">Feels Like</div><div class="value" id="w-feels"></div></div>
                </div>
                <div class="detail-box">
                    <i class="fa-solid fa-droplet icon-humid"></i>
                    <div><div class="label">Humidity</div><div class="value" id="w-humidity"></div></div>
                </div>
                <div class="detail-box">
                    <i class="fa-solid fa-wind icon-wind"></i>
                    <div><div class="label">Wind</div><div class="value" id="w-wind"></div></div>
                </div>
                <div class="detail-box">
                    <i class="fa-solid fa-eye icon-vis"></i>
                    <div><div class="label">Visibility</div><div class="value" id="w-vis"></div></div>
                </div>
            </div>
            <div class="forecast-section" id="forecast-section">
                <div class="forecast-title">5-Day Forecast</div>
                <div id="forecast-rows"></div>
            </div>
        </div>

    </div>
</div>

<script type="application/json" id="server-weather">{{ weather | tojson }}</script>
<script type="application/json" id="server-error">{{ error | tojson }}</script>
<script src="/static/lib/leaflet.js"></script>
<script>
    var OWM_KEY = '6d76615fa92c3a69179885fd825ffff7';

    // ── THEME INIT ──
    var isDark = (localStorage.getItem('weather-theme') || 'dark') === 'dark';

    // Set correct icon on page load
    document.getElementById('theme-icon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';

    var map = L.map('map', {
        center: [20.5937, 78.9629],
        zoom: 5,
        minZoom: 4
    });

    var baseLayer = L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/' + (isDark ? 'dark_all' : 'light_all') + '/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    var currentOverlay = null;
    var currentTab = 'weather';

    // ── THEME TOGGLE ──
    document.getElementById('theme-toggle').addEventListener('click', function() {
        isDark = !isDark;
        var theme = isDark ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('theme-icon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        localStorage.setItem('weather-theme', theme);

        // Swap Leaflet base tiles
        map.removeLayer(baseLayer);
        baseLayer = L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/' + (isDark ? 'dark_all' : 'light_all') + '/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CartoDB',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        if (currentOverlay) { baseLayer.bringToBack(); }
    });

    // OWM tile layer configs
    var overlays = {
        rain:    { layer: 'precipitation_new', label: 'Live Rain — Precipitation overlay' },
        wind:    { layer: 'wind_new',           label: 'Live Wind — Wind speed overlay' },
        temp:    { layer: 'temp_new',           label: 'Live Temperature overlay' },
        clouds:  { layer: 'clouds_new',         label: 'Live Cloud coverage overlay' }
    };

    // Legends
    var legends = {
        rain: [
            { color: '#a0d8ef', text: 'Light rain' },
            { color: '#4fc3f7', text: 'Moderate rain' },
            { color: '#0288d1', text: 'Heavy rain' },
            { color: '#01579b', text: 'Very heavy rain' }
        ],
        wind: [
            { color: '#e8f5e9', text: '0–2 m/s Calm' },
            { color: '#81c784', text: '2–5 m/s Breeze' },
            { color: '#ffb74d', text: '5–10 m/s Moderate' },
            { color: '#e53935', text: '10+ m/s Strong' }
        ],
        temp: [
            { color: '#4fc3f7', text: 'Below 0°C' },
            { color: '#81c784', text: '0–15°C' },
            { color: '#ffb74d', text: '15–25°C' },
            { color: '#e53935', text: '25°C+' }
        ],
        clouds: [
            { color: '#f5f5f5', text: '0–25% Clear' },
            { color: '#b0bec5', text: '25–50% Partly' },
            { color: '#78909c', text: '50–75% Mostly' },
            { color: '#37474f', text: '75–100% Overcast' }
        ]
    };

    function setOverlay(type) {
        if (currentOverlay) {
            map.removeLayer(currentOverlay);
            currentOverlay = null;
        }
        if (!type) return;

        baseLayer.bringToBack();

        currentOverlay = L.tileLayer(
            'https://tile.openweathermap.org/map/' + overlays[type].layer + '/{z}/{x}/{y}.png?appid=' + OWM_KEY,
            { opacity: 0.95, attribution: '&copy; OpenWeatherMap', zIndex: 1000 }
        ).addTo(map);

        // Show label
        var lbl = document.getElementById('overlay-label');
        lbl.textContent = overlays[type].label;
        lbl.classList.add('visible');

        // Show legend
        var leg = document.getElementById('legend');
        var rows = legends[type].map(function(r) {
            return '<div class="legend-row"><div class="legend-color" style="background:' + r.color + '"></div>' + r.text + '</div>';
        }).join('');
        leg.innerHTML = '<div class="legend-title">' + type.charAt(0).toUpperCase() + type.slice(1) + '</div>' + rows;
        leg.classList.add('visible');
    }

    function clearOverlay() {
        if (currentOverlay) { map.removeLayer(currentOverlay); currentOverlay = null; }
        document.getElementById('overlay-label').classList.remove('visible');
        document.getElementById('legend').classList.remove('visible');
    }

    function switchTab(tab) {
        currentTab = tab;

        // Update tab active states
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelector('.tab-' + tab).classList.add('active');

        var sidebar    = document.getElementById('sidebar');
        var searchWrap = document.getElementById('search-wrap');
        var mapEl      = document.getElementById('map');

        if (tab === 'weather') {
            sidebar.classList.add('visible');
            searchWrap.classList.add('visible');
            mapEl.classList.add('clickable');
            clearOverlay();
            // remove marker when switching away and back
        } else {
            sidebar.classList.remove('visible');
            searchWrap.classList.remove('visible');
            mapEl.classList.remove('clickable');
            setOverlay(tab);
        }
    }

    // ── WEATHER TAB FUNCTIONS ──
    function showLoading() {
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('weather-card').style.display = 'none';
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('forecast-section').classList.remove('visible');
    }

    function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-text').textContent = msg;
    }

    function showWeather(data, lat, lon) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('weather-card').style.display = 'block';

        document.getElementById('w-city').textContent = data.city;
        document.getElementById('w-coords').textContent = (lat && lon)
            ? parseFloat(lat).toFixed(2) + '\u00b0N, ' + parseFloat(lon).toFixed(2) + '\u00b0E' : '';
        document.getElementById('w-icon').src = 'https://openweathermap.org/img/wn/' + data.icon + '@2x.png';
        document.getElementById('w-icon').alt = data.description;
        document.getElementById('w-temp').innerHTML = Math.round(data.temp) + '<sup>&deg;C</sup>';
        document.getElementById('w-desc').textContent = data.description;
        document.getElementById('w-feels').textContent = Math.round(data.feels_like) + '\u00b0C';
        document.getElementById('w-humidity').textContent = data.humidity + '%';
        document.getElementById('w-wind').textContent = data.wind + ' m/s';
        document.getElementById('w-vis').textContent = data.visibility
            ? (data.visibility / 1000).toFixed(1) + ' km' : 'N/A';
    }

    // ── MAP CLICK — fetch weather by coords (Weather tab only) ──
    // Fix Leaflet default icon paths broken in Flask
    delete L.Icon.Default.prototype._getIconUrl;
    L.Icon.Default.mergeOptions({
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png'
    });

    var marker = null;

    function fetchForecast(params) {
        fetch('/forecast-by-coords?' + params)
            .then(function(r) { return r.json(); })
            .then(function(days) {
                if (!days || days.error || days.length === 0) return;
                var html = '';
                days.forEach(function(d) {
                    html += '<div class="forecast-row">' +
                        '<div class="forecast-day">' + d.day + '</div>' +
                        '<img class="forecast-icon" src="https://openweathermap.org/img/wn/' + d.icon + '@2x.png" alt="">' +
                        '<div class="forecast-desc">' + d.description + '</div>' +
                        '<div class="forecast-temps">' +
                            '<div class="hi">' + d.temp_max + '&deg;C</div>' +
                            '<div class="lo">' + d.temp_min + '&deg;C</div>' +
                        '</div>' +
                    '</div>';
                });
                document.getElementById('forecast-rows').innerHTML = html;
                document.getElementById('forecast-section').classList.add('visible');
            });
    }

    function fetchWeatherByCoords(lat, lon) {
        showLoading();
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lon]).addTo(map);

        fetch('/weather-by-coords?lat=' + lat + '&lon=' + lon)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    showError(data.error);
                } else {
                    showWeather(data, lat, lon);
                    fetchForecast('lat=' + lat + '&lon=' + lon);
                    marker.bindPopup(
                        '<b>' + data.city + '</b><br>' +
                        Math.round(data.temp) + '&deg;C &mdash; ' + data.description
                    ).openPopup();
                }
            })
            .catch(function() { showError('Failed to fetch weather. Check your connection.'); });
    }

    map.on('click', function(e) {
        if (currentTab === 'weather') {
            fetchWeatherByCoords(e.latlng.lat, e.latlng.lng);
        }
    });

    // Load server-side search result
    var serverWeather = JSON.parse(document.getElementById('server-weather').textContent);
    var serverError   = JSON.parse(document.getElementById('server-error').textContent);

    if (serverWeather) {
        document.getElementById('placeholder').style.display = 'none';
        showWeather(serverWeather, null, null);
        fetchForecast('city=' + encodeURIComponent(serverWeather.city));
    }

    if (serverError) {
        document.getElementById('placeholder').style.display = 'none';
        showError(serverError);
    }
</script>

</body>
</html>
